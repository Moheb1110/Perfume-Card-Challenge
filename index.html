    <title> Product preview card Challenge</title>

<body>
    <main>
        <div class="container">
            <div class="left">
                <img src="image-product-desktop.jpg" alt="">
            </div>
            <div class="right">

                <p class="title">PERFUME</p>

                <h1>Gabrielle Essence Eau De Parfum</h1>

                <p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.</p>

                <h1 class="price">$149.99<h5><del>$169.99</del></h5></h1>
                <button>
                    <img src="icon-cart.svg" class="icon">
                    Add to Cart
                </button>
            </div>


        </div>
    </main>
